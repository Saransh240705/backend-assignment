version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: antigravity-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: antigravity_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: antigravity-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: antigravity-backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      PORT: 5051
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/antigravity_db?schema=public
      JWT_SECRET: productionjwtsecretreplaceinprod
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
    ports:
      - "5051:5051"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: antigravity-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
